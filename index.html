<div class="grid">
    <div class="card">
        <img src="./assets/noticia-1.png" alt="Noticias IA" onerror="this.src='https://via.placeholder.com/400x200/111323/45e0ff?text=Noticia+IA'">
        <h3>Flash Informativo IA</h3>
        <p>Información local procesada en tiempo real por Inteligencia Artificial.</p>
    </div>
    <div class="card">
        <img src="./assets/podcast-1.png" alt="Podcast" onerror="this.src='https://via.placeholder.com/400x200/111323/45e0ff?text=Podcast'">
        <h3>Historias Latinas</h3>
        <p>Entrevistas exclusivas con los emprendedores de nuestra comunidad.</p>
    </div>
</div>

<script>
    // USANDO PROXY URL PARA EVITAR BLOQUEO SSL EN IPHONE (PUERTO 443)
    const streamUrl = "https://radioconexionlatina.com/listen/radio/radio.mp3";
    let audio = null;
    let isPlaying = false;

    function toggleRadio() {
        const btn = document.getElementById('playBtn');
        if (!isPlaying) {
            if (!audio) {
                audio = new Audio(streamUrl);
                audio.preload = "none";
            }
            audio.play().then(() => {
                btn.innerHTML = "⏸";
                isPlaying = true;
            }).catch(e => {
                // Segundo intento forzado para iOS
                audio.src = streamUrl;
                audio.play();
                btn.innerHTML = "⏸";
                isPlaying = true;
            });
        } else {
            audio.pause();
            audio.src = ""; 
            audio.load();
            btn.innerHTML = "▶";
            isPlaying = false;
        }
    }

    async function updateMeta() {
        try {
            const res = await fetch("https://radioconexionlatina.com/api/nowplaying/1");
            const data = await res.json();
            document.getElementById('track-title').innerText = data.now_playing.song.text || "Radio Conexión Latina";
        } catch (e) {
            document.getElementById('track-title').innerText = "Radio Conexión Latina Edmonton";
        }
    }
    updateMeta();
    setInterval(updateMeta, 10000);
</script>
